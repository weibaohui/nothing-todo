name: Build GUI (Tauri)

# Triggered after rust.yaml completes
on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-gui:
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            pkg: ntd-desktop-linux-x64
            bundle: deb
            artifact_name: nothing-todo-linux-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: ntd-desktop-windows-x64
            bundle: nsis
            artifact_name: nothing-todo-windows-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: ntd-desktop-darwin-arm64
            bundle: dmg
            artifact_name: nothing-todo-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      # Download artifacts from the triggering rust.yaml workflow run using curl
      - name: Download backend binary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading artifact ${{ matrix.artifact_name }} from workflow run ${{ github.event.workflow_run.id }}"
          # Get artifact ID and download URL from the triggering workflow run
          ARTIFACT_DATA=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts --jq '.artifacts[] | select(.name == "${{ matrix.artifact_name }}") | {id, archive_download_url}')
          ARTIFACT_ID=$(echo "$ARTIFACT_DATA" | jq -r '.id')
          DOWNLOAD_URL=$(echo "$ARTIFACT_DATA" | jq -r '.archive_download_url')
          echo "Artifact ID: $ARTIFACT_ID"
          echo "Download URL: $DOWNLOAD_URL"
          # Download and extract artifact
          curl -L -o artifact.zip "$DOWNLOAD_URL"
          unzip -o artifact.zip
          rm artifact.zip
          ls -la

      - name: Verify backend binary
        shell: bash
        run: |
          ls -la

      - name: Prepare backend binary for bundle
        shell: bash
        run: |
          mkdir -p backend/target/${{ matrix.target }}/release/
          # Find the binary file in the downloaded artifact and rename to 'ntd'
          for f in ntd ntd.exe ntd-*; do
            if [ -f "$f" ]; then
              cp "$f" backend/target/${{ matrix.target }}/release/ntd
              chmod +x backend/target/${{ matrix.target }}/release/ntd
              echo "Copied $f as ntd"
              break
            fi
          done
          ls -la backend/target/${{ matrix.target }}/release/

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Verify frontend dist
        shell: bash
        run: ls -la frontend/dist/

      - name: Build Tauri bundle
        shell: bash
        run: |
          cd src-tauri
          npx @tauri-apps/cli@latest build \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundle }}

      - name: Find built artifacts
        shell: bash
        run: |
          echo "=== Release directory ==="
          ls -la src-tauri/target/${{ matrix.target }}/release/ 2>/dev/null | head -20 || dir src-tauri\\target\\${{ matrix.target }}\\release\\ 2>/dev/null | head -20 || true
          echo ""
          echo "=== Bundle directory ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null | head -20 || dir /s /b src-tauri\\target\\${{ matrix.target }}\\release\\bundle\\*.exe src-tauri\\target\\${{ matrix.target }}\\release\\bundle\\*.msi 2>/dev/null || true

      - name: Prepare artifacts for upload
        shell: bash
        run: |
          mkdir -p dist
          if [ -d "src-tauri/target/${{ matrix.target }}/release/bundle" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( \
              -name "*.exe" -o \
              -name "*.msi" -o \
              -name "*.dmg" -o \
              -name "*.app" -o \
              -name "*.deb" -o \
              -name "*.rpm" \
            \) -exec cp {} dist/ \; 2>/dev/null || true
          fi
          ls -la dist/ 2>/dev/null || dir dist\\ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: dist/*

  release:
    needs: build-gui
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
