name: Build GUI (Tauri)

# Same trigger conditions as rust.yaml
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Get the run ID of the rust.yaml workflow that was triggered by this tag
  get-rust-run:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.find-run.outputs.run_id }}
    steps:
      - name: Find rust.yaml workflow run for this tag
        id: find-run
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Looking for rust.yaml run with tag: $TAG_NAME"
          RUN_ID=$(gh run list --workflow=rust.yml --event=push --status=success --limit 50 --json id --jq '.[] | select(.head_branch == "'$TAG_NAME'") | .id' | head -1)
          if [ -z "$RUN_ID" ]; then
            # Try alternative: get most recent successful run
            RUN_ID=$(gh run list --workflow=rust.yml --status=success --limit 1 --json id --jq '.[0].id')
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Found run ID: $RUN_ID"

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          path: backend-artifacts
          run-id: ${{ steps.find-run.outputs.run_id }}
          pattern: nothing-todo-*
          merge-multiple: true

      - name: Verify artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la backend-artifacts/

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binaries
          path: backend-artifacts/

  build-gui:
    needs: get-rust-run
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            pkg: ntd-desktop-linux-x64
            bundle: deb
            bin_name: ntd-linux-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: ntd-desktop-windows-x64
            bundle: nsis
            bin_name: ntd-windows-x64.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: ntd-desktop-darwin-arm64
            bundle: dmg
            bin_name: ntd-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binaries
          path: backend-artifacts

      - name: Prepare backend binary for bundle
        shell: bash
        run: |
          mkdir -p backend/target/${{ matrix.target }}/release/
          cp backend-artifacts/${{ matrix.bin_name }} backend/target/${{ matrix.target }}/release/ntd
          chmod +x backend/target/${{ matrix.target }}/release/ntd
          ls -la backend/target/${{ matrix.target }}/release/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Verify frontend dist
        shell: bash
        run: ls -la frontend/dist/

      - name: Build Tauri bundle
        shell: bash
        run: |
          cd src-tauri
          npx @tauri-apps/cli@latest build \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundle }}

      - name: Find built artifacts
        shell: bash
        run: |
          echo "=== Release directory ==="
          ls -la src-tauri/target/${{ matrix.target }}/release/ 2>/dev/null | head -20 || dir src-tauri\\target\\${{ matrix.target }}\\release\\ 2>/dev/null | head -20 || true
          echo ""
          echo "=== Bundle directory ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null | head -20 || dir /s /b src-tauri\\target\\${{ matrix.target }}\\release\\bundle\\*.exe src-tauri\\target\\${{ matrix.target }}\\release\\bundle\\*.msi 2>/dev/null || true

      - name: Prepare artifacts for upload
        shell: bash
        run: |
          mkdir -p dist
          if [ -d "src-tauri/target/${{ matrix.target }}/release/bundle" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( \
              -name "*.exe" -o \
              -name "*.msi" -o \
              -name "*.dmg" -o \
              -name "*.app" -o \
              -name "*.deb" -o \
              -name "*.rpm" \
            \) -exec cp {} dist/ \; 2>/dev/null || true
          fi
          ls -la dist/ 2>/dev/null || dir dist\\ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: dist/*

  release:
    needs: build-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
