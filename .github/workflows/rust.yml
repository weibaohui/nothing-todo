name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true

          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true

          # Windows x86_64
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use-cross: true

          # macOS x86_64 (macos-13 is the last x86_64 runner)
          - os: macos-13
            target: x86_64-apple-darwin
            use-cross: false

          # macOS aarch64 (macos-latest is ARM)
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 安装 Node.js（构建前端）
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 安装前端依赖并构建
      - name: Build frontend
        run: cd frontend && npm ci --legacy-peer-deps && npm run build

      # 安装 cross（仅需要交叉编译的平台）
      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      # 交叉编译
      - name: Build (cross)
        if: matrix.use-cross == true
        run: cd backend && cross build --release --target ${{ matrix.target }}

      # 原生编译（macOS）
      - name: Build (native)
        if: matrix.use-cross == false
        run: cd backend && cargo build --release --target ${{ matrix.target }}

      # 上传二进制产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntd-${{ matrix.target }}
          path: backend/target/${{ matrix.target }}/release/ntd*
