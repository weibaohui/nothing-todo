name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: cd frontend && npm ci --legacy-peer-deps && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build:
    needs: build-frontend
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true

          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true

          # Windows x86_64
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use-cross: true

          # macOS aarch64 (macos-latest is ARM)
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # 下载前端产物
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Verify frontend dist
        run: ls -la frontend/dist/

      # 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 安装 cross（仅需要交叉编译的平台）
      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      # 交叉编译
      # cross 把 backend/ 挂载为 /project，rust-embed 的 ../frontend/dist/ 解析为 /frontend/dist/
      # 通过 CROSS_CONTAINER_OPTS 把宿主机的前端产物挂载到容器的 /frontend/dist
      - name: Build (cross)
        if: matrix.use-cross == true
        env:
          CROSS_CONTAINER_OPTS: "-v ${{ github.workspace }}/frontend/dist:/frontend/dist:ro"
        run: cd backend && cross build --release --target ${{ matrix.target }}

      # 原生编译（macOS）
      - name: Build (native)
        if: matrix.use-cross == false
        run: cd backend && cargo build --release --target ${{ matrix.target }}

      # 上传二进制产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntd-${{ matrix.target }}
          path: backend/target/${{ matrix.target }}/release/ntd*
