name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend dist
        run: |
          echo "==== frontend/dist ===="
          find frontend/dist -type f | sort | head -100

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build:
    needs: build-frontend

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
            pkg: nothing-todo-linux-x64
            bin: ntd
            name: ntd-linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            pkg: nothing-todo-linux-arm64
            bin: ntd
            name: ntd-linux-arm64

          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use-cross: true
            pkg: nothing-todo-windows-x64
            bin: ntd.exe
            name: ntd-windows-x64.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            pkg: nothing-todo-darwin-arm64
            bin: ntd
            name: ntd-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Verify downloaded frontend dist
        run: |
          echo "==== downloaded frontend/dist ===="
          find frontend/dist -type f | sort | head -100

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      - name: Debug mounted frontend path
        if: matrix.use-cross == true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/frontend/dist:/project/frontend/dist:ro \
            alpine:latest \
            sh -c "echo '==== inside container ====' && find /project/frontend/dist | head -50"

      - name: Build (cross)
        if: matrix.use-cross == true
        working-directory: backend
        env:
          CROSS_CONTAINER_OPTS: >-
            -v ${{ github.workspace }}/frontend/dist:/project/frontend/dist:ro
            -v ${{ github.workspace }}/.git:/project/.git:ro
          GIT_DIR: /project/.git
        run: |
          cargo clean
          cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use-cross == false
        working-directory: backend
        run: |
          cargo clean
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary for upload
        run: |
          mkdir -p dist

          cp backend/target/${{ matrix.target }}/release/${{ matrix.bin }} \
            "dist/${{ matrix.name }}"

          chmod +x "dist/${{ matrix.name }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: dist/${{ matrix.name }}

  release:
    needs: build

    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: nothing-todo-*

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: artifacts/**/ntd-*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          echo "Publishing version: $VERSION"

          mkdir -p packages/nothing-todo-linux-x64/bin
          mkdir -p packages/nothing-todo-linux-arm64/bin
          mkdir -p packages/nothing-todo-darwin-arm64/bin
          mkdir -p packages/nothing-todo-windows-x64/bin

          cp artifacts/nothing-todo-linux-x64/ntd-linux-x64 \
            packages/nothing-todo-linux-x64/bin/ntd

          cp artifacts/nothing-todo-linux-arm64/ntd-linux-arm64 \
            packages/nothing-todo-linux-arm64/bin/ntd

          cp artifacts/nothing-todo-darwin-arm64/ntd-darwin-arm64 \
            packages/nothing-todo-darwin-arm64/bin/ntd

          cp artifacts/nothing-todo-windows-x64/ntd-windows-x64.exe \
            packages/nothing-todo-windows-x64/bin/ntd.exe

          chmod +x packages/nothing-todo-linux-x64/bin/ntd
          chmod +x packages/nothing-todo-linux-arm64/bin/ntd
          chmod +x packages/nothing-todo-darwin-arm64/bin/ntd

          for pkg in \
            nothing-todo-linux-x64 \
            nothing-todo-linux-arm64 \
            nothing-todo-darwin-arm64 \
            nothing-todo-windows-x64 \
            nothing-todo
          do
            node -e "
              const fs=require('fs');
              const p=JSON.parse(fs.readFileSync('packages/$pkg/package.json','utf8'));
              p.version='$VERSION';
              fs.writeFileSync(
                'packages/$pkg/package.json',
                JSON.stringify(p, null, 2) + '\n'
              );
            "

            echo "Updated $pkg to $VERSION"
          done

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in \
            nothing-todo-linux-x64 \
            nothing-todo-linux-arm64 \
            nothing-todo-darwin-arm64 \
            nothing-todo-windows-x64
          do
            echo "Publishing @weibaohui/$pkg..."

            cd packages/$pkg
            npm publish --access public
            cd ../..
          done

      - name: Publish wrapper package to npm
        working-directory: packages/nothing-todo
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public