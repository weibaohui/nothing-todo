# cargo-deny 配置文件。
# 用法：
#   cargo install cargo-deny
#   cargo deny check
# CI 应当把 `cargo deny check` 作为阻断项；本地若新加依赖引发违规，请在此处显式 skip
# 并在 PR 描述里给出理由。

# 1. 漏洞数据库：使用 GitHub Advisory Database 默认镜像。
#    离线环境可改为本地 JSON 文件路径。
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# 已审计的安全漏洞。sea-orm 已升级至 1.0.1（0.12→1.x）。
# sqlx 仍为 0.7（sea-orm 1.x 内部绑定），0.8 需等 sea-orm 升级内部依赖。
#
# - RUSTSEC-2024-0363: sqlx<0.8 二进制协议误解析。SQLite 后端不受影响。
# - RUSTSEC-2026-0098/0099/0104: rustls-webpki v0.101 漏洞（sqlx 链路）。
# - RUSTSEC-2023-0071: rsa 0.9 时序侧信道。本服务不涉及 RSA 密钥操作。
ignore = [
    "RUSTSEC-2024-0363",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    "RUSTSEC-2023-0071",
    # 已停止维护的传递依赖
    "RUSTSEC-2024-0436", # paste
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2026-0173", # proc-macro-error2
    "RUSTSEC-2025-0134", # rustls-pemfile
]

# 2. License 限制：只允许明确列出的 license；其余必须显式 allow。
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "NTP",
]
confidence-threshold = 0.8

# 3. 来源限制：默认从 crates.io 取；可加 Git 源白名单（内部 fork）。
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
# 工作区内部清单：禁止误传某些常用包（容易引入"另一种实现"造成分裂）
skip = []
skip-tree = []

# 4. 来源仓库
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
