# NTD 自定义模板示例
# 复制此文件到公开的 GitHub 仓库，然后在"模板管理 -> 自定义"中订阅原始文件地址
# Raw 文件地址格式: https://raw.githubusercontent.com/{user}/{repo}/{branch}/templates.example.yaml

- title: "站会 Git 活动总结"
  prompt: "为站会总结昨天的 git 活动。\n\n依据规则：\n- 陈述需锚定到提交/PR/文件；不要臆测意图或未来工作\n- 保持便于快速浏览，适合团队同步"
  category: "Team Collaboration"

- title: "PR 周报总结"
  prompt: "按队友和主题总结上周的 PR；突出风险。\n\n依据规则：\n- 有 PR 编号/标题时请使用\n- 不要推测影响；只说明 PR 改了什么"
  category: "Team Collaboration"

- title: "Bug 扫描与修复"
  prompt: "扫描最近的提交（自上次运行以来，或过去 24 小时内），查找可能的 bug 并提出最小修复方案。\n\n依据规则：\n- 只使用仓库中的具体证据（提交 SHA、PR、文件路径、diff、失败的测试、CI 信号）\n- 不要臆造 bug；如果证据不足，请说明并跳过\n- 优先选择最小且安全的修复；避免重构和无关清理"
  category: "Code Quality"

- title: "依赖版本漂移检测"
  prompt: "检测依赖项和 SDK 的版本漂移，并提出最小对齐方案。\n\n依据规则：\n- 尽可能从仓库中引用当前版本和目标版本（锁文件、包清单）\n- 不要猜测版本；如果目标不明确，请提出可选方案并标明为建议"
  category: "Code Quality"

- title: "CI 失败总结与建议"
  prompt: "总结最近一个 CI 窗口中的 CI 失败和不稳定测试；提出首要修复建议。\n\n依据规则：\n- 尽可能引用具体作业、测试、错误信息或日志片段\n- 避免过度自信地断言根因；区分\"已观察到\"与\"疑似\""
  category: "CI"

- title: "性能回归审查"
  prompt: "审查性能回归，并提出收益最大的修复建议。\n\n依据规则：\n- 有测量数据/跟踪信息时，结论应以其为依据\n- 若证据不足，简要说明不确定性，并建议下一步应测量什么"
  category: "Code Quality"
